name: Orchestrator MCP

on:
  push:
    paths:
      - "plugins/cursor-orchestrator/mcp-server/**"
  pull_request:
    paths:
      - "plugins/cursor-orchestrator/mcp-server/**"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/cursor-orchestrator/mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: plugins/cursor-orchestrator/mcp-server/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
