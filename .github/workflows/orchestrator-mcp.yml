name: Orchestrator MCP

on:
  push:
    paths:
      - "plugins/cursor-orchestrator/**"
      - ".cursor/commands/**"
      - "docs/publishing/**"
      - "scripts/verify-cursor-orchestrator.mjs"
      - "scripts/validate-template.mjs"
      - "scripts/publish-gate.mjs"
      - ".github/workflows/orchestrator-mcp.yml"
  pull_request:
    paths:
      - "plugins/cursor-orchestrator/**"
      - ".cursor/commands/**"
      - "docs/publishing/**"
      - "scripts/verify-cursor-orchestrator.mjs"
      - "scripts/validate-template.mjs"
      - "scripts/publish-gate.mjs"
      - ".github/workflows/orchestrator-mcp.yml"

concurrency:
  group: orchestrator-mcp-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-plugin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Command inventory + validate-template
        run: node scripts/verify-cursor-orchestrator.mjs

  build-test:
    needs: verify-plugin
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: plugins/cursor-orchestrator/mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: plugins/cursor-orchestrator/mcp-server/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Committed dist matches clean build (no drift)
        working-directory: ${{ github.workspace }}
        run: git diff --exit-code -- plugins/cursor-orchestrator/mcp-server/dist
